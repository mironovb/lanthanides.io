{% comment %}
  JSON-LD structured data for element detail pages.
  Expects: page.symbol, page.name, page.description, cat_info, retail_ref, bulk_ref
{% endcomment %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ page.name }} ({{ page.symbol }}) — Price per kg",
  "description": "{{ page.description | escape }}",
  "url": "{{ site.url }}{{ page.url }}",
  "brand": {
    "@type": "Brand",
    "name": "{{ page.name }}"
  },
  "category": "{% case cat_info.category %}{% when 'rare_earth_light' %}Light Rare Earth Element{% when 'rare_earth_heavy' %}Heavy Rare Earth Element{% when 'strategic_metal' %}Strategic Metal{% when 'semiconductor_metal' %}Semiconductor Metal{% endcase %}",
  "additionalProperty": [
    {
      "@type": "PropertyValue",
      "name": "Atomic Number",
      "value": "{{ cat_info.atomic_number }}"
    },
    {
      "@type": "PropertyValue",
      "name": "Chemical Symbol",
      "value": "{{ page.symbol }}"
    }{% if cat_info.export_control_status == 'restricted' %},
    {
      "@type": "PropertyValue",
      "name": "Export Control Status",
      "value": "Chinese export licence required"
    }{% endif %}
  ]{% if retail_ref or bulk_ref %},
  "offers": [{% if retail_ref %}
    {
      "@type": "Offer",
      "name": "Retail Reference — {{ page.name }} metal price per kg",
      "priceCurrency": "USD",
      "price": "{{ retail_ref.normalized_usd_per_kg }}",
      "unitCode": "KGM",
      "priceValidUntil": "{{ retail_ref.quote_date }}",
      "availability": "https://schema.org/InStock",
      "seller": {
        "@type": "Organization",
        "name": "{{ retail_ref.seller_name | escape }}"
      },
      "itemCondition": "https://schema.org/NewCondition"
    }{% if bulk_ref %},{% endif %}{% endif %}{% if bulk_ref %}
    {
      "@type": "Offer",
      "name": "Bulk Benchmark — {{ page.name }} industrial price per kg",
      "priceCurrency": "USD",
      "price": "{{ bulk_ref.normalized_usd_per_kg }}",
      "unitCode": "KGM",
      "priceValidUntil": "{{ bulk_ref.quote_date }}",
      "availability": "https://schema.org/InStock",
      "seller": {
        "@type": "Organization",
        "name": "{{ bulk_ref.seller_name | escape }}"
      },
      "itemCondition": "https://schema.org/NewCondition"
    }{% endif %}
  ]{% endif %}
}
</script>
