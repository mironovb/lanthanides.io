title: "Strategic Materials Ledger"
description: "Real-time price tracking and provenance auditing for rare earth elements and strategic materials"
url: "https://mironovb.github.io"
baseurl: "/periodicpricing"

markdown: kramdown
highlighter: rouge
permalink: pretty

sass:
  style: compressed
  sass_dir: _sass

collections:
  elements:
    output: true
    permalink: /elements/:name/

defaults:
  - scope:
      path: ""
      type: "elements"
    values:
      layout: "element-detail"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - invoices/
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - "*.py"
  - requirements.txt
  - _data/demo/
