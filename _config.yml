title: "lanthanides.io"
description: "Pricing intelligence for rare earths, rare metals, strategic metals & semiconductor materials"
url: "https://www.lanthanides.io"
baseurl: ""

markdown: kramdown
highlighter: rouge
permalink: pretty

sass:
  style: compressed
  sass_dir: _sass

collections:
  elements:
    output: true
    permalink: /elements/:name/
  articles:
    output: true
    permalink: /news/:name/

defaults:
  - scope:
      path: ""
      type: "elements"
    values:
      layout: "element-detail"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - invoices/
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - "*.py"
  - requirements.txt
  - _data/demo/
