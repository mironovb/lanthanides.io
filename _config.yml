title: "lanthanides.io"
description: "Current rare earth prices per kilogram — track neodymium, dysprosium, terbium, gallium, germanium and 25+ strategic metals with retail and bulk pricing, export control status, and supplier provenance"
url: "https://www.lanthanides.io"
baseurl: ""
lang: "en"

author:
  name: "Bogdan Mironov"

twitter:
  card: summary_large_image

markdown: kramdown
highlighter: rouge
permalink: pretty

sass:
  style: compressed
  sass_dir: _sass

collections:
  elements:
    output: true
    permalink: /elements/:name/
  articles:
    output: true
    permalink: /news/:name/

defaults:
  - scope:
      path: ""
      type: "elements"
    values:
      layout: "element-detail"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - invoices/
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - "*.py"
  - requirements.txt
  - _data/demo/
