title: "lanthanides.io — Rare Earth Prices, Export Controls & Strategic Materials Intelligence"
description: "Real-time rare earth element prices with source provenance. Retail pricing surveys across 20+ suppliers, bulk commodity benchmarks, Chinese export control tracking by MOFCOM announcement number, and original market intelligence from direct seller contacts."
url: "https://www.lanthanides.io"
baseurl: ""
lang: "en"
author: "Bogdan Mironov"

twitter:
  card: summary_large_image

markdown: kramdown
highlighter: rouge
permalink: pretty

sass:
  style: compressed
  sass_dir: _sass

collections:
  elements:
    output: true
    permalink: /elements/:name/
  articles:
    output: true
    permalink: /news/:name/

defaults:
  - scope:
      path: ""
      type: "elements"
    values:
      layout: "element-detail"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - invoices/
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - "*.py"
  - requirements.txt
  - _data/demo/
