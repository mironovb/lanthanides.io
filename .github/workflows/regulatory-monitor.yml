name: Regulatory monitor

# Cron every 6 hours. Catches MOFCOM business-hours batches without burning
# minutes on empty polls. Adjust the cron if you want a different cadence.
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:      # also manually triggerable

permissions:
  contents: write         # for committing run_state.json updates
  pull-requests: write    # reserved for future autonomous-PR layer
  issues: write           # reserved for future GitHub-issue alerts

concurrency:
  group: regulatory-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true   # needed so we can commit state back

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            scripts/scraper/requirements.txt
            scripts/notify/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts/scraper/requirements.txt
          pip install -r scripts/notify/requirements.txt

      - name: Run regulatory monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_RECIPIENT:    ${{ secrets.EMAIL_RECIPIENT }}   # optional, no-op if unset
          DEEPL_API_KEY:      ${{ secrets.DEEPL_API_KEY }}     # optional; Chinese stays untranslated if unset
          # Non-secret: narrows the scrape to REE-relevant items so the digest isn't flooded.
          # Without it, passes_keyword_filter() returns True for everything. EN + 中文 terms.
          KEYWORD_FILTER: "rare earth,REE,稀土,permanent magnet,永磁,neodymium,praseodymium,dysprosium,terbium,yttrium,samarium,gadolinium,lutetium,scandium,镨,钕,镝,铽,钇,钐,钆,镥,钪,export control,出口管制,critical mineral,关键矿产,quota,配额,稀土配额,license,许可证,MOFCOM,商务部,MIIT,工信部,tariff,关税,Section 301,Section 232,IEEPA,NdFeB,SmCo"
        run: python scripts/run_monitor.py

      - name: Commit state changes (if any)
        if: success()
        run: |
          git config --global user.name 'regulatory-monitor'
          git config --global user.email 'regulatory-monitor@users.noreply.github.com'
          if [[ -n "$(git status --porcelain scripts/run_state.json scripts/scraper/data/seen.sqlite scripts/scraper/data/articles)" ]]; then
            git add scripts/run_state.json scripts/scraper/data/
            git commit -m "monitor: state update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "no state changes to commit"
          fi

      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-log-${{ github.run_id }}
          path: |
            scripts/scraper/scraper.log
            scripts/run_state.json
          retention-days: 14
          if-no-files-found: ignore
