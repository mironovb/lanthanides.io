name: Weekly Price Update

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-price-update
  cancel-in-progress: false

jobs:
  collect-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare update branch
        env:
          BRANCH: automation/weekly-price-update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git fetch origin "$BRANCH" 2>/dev/null || true
          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git rebase origin/main
          else
            git checkout -B "$BRANCH" origin/main
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run data collection pipeline
        run: python scripts/reex_collector.py --verbose
        env:
          REEX_RUN_DATE: ${{ github.event.schedule && 'scheduled' || 'manual' }}

      - name: Validate data integrity
        run: |
          python -c "
          import json, sys
          with open('_data/price_records.json') as f:
              data = json.load(f)
          print(f'Validation passed: {len(data)} records')
          if not isinstance(data, list):
              print('ERROR: price_records.json is not a list')
              sys.exit(1)
          "

      - name: Regenerate fluctuations artifact
        # reex_collector already does this, but run it explicitly so a manual
        # workflow_dispatch (with no new records to collect) still refreshes
        # assets/data/fluctuations.json from the current price_history files.
        run: python scripts/fluctuations.py --verbose

      - name: Update Market Movements feed
        # Append + dedupe factual price-spike / regulatory-change events.
        run: python scripts/detect_movements.py --verbose

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet _data/ assets/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Validate site build
        if: steps.changes.outputs.changed == 'true'
        run: |
          npm run lint
          npm run build

      - name: Commit updates and open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: automation/weekly-price-update
        run: |
          set -euo pipefail
          git add _data/price_records.json _data/price_history/ _data/snapshots/ _data/fluctuations.json _data/movements.yml assets/data/fluctuations.json
          git commit -m "data: weekly price update $(date -u +%Y-%m-%d)"
          git push --force-with-lease origin "$BRANCH"

          existing_pr=$(gh pr list \
            --repo "$REPO" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "$existing_pr" ]]; then
            echo "updated existing weekly price update PR #$existing_pr"
          else
            gh pr create \
              --repo "$REPO" \
              --base main \
              --head "$BRANCH" \
              --title "data: weekly price update" \
              --body "Updates price data, fluctuations, and market movements from the scheduled collector. This workflow pushes an automation branch and opens a PR instead of pushing to main, so it cannot trigger a branch-based GitHub Pages deployment directly. Validation run: npm run lint; npm run build."
          fi
