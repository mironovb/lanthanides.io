# Strategic Materials Ledger — Policy Events
# Real policy events sourced from MOFCOM, EU OJ, and State Council publications.
# Event types: export_control, export_ban, sanction, suspension, regulation

- id: pe-2023-07-23
  date: "2023-07-03"
  title: "China imposes first export controls on gallium and germanium"
  description: >-
    Export licence requirements for gallium and germanium products, effective 1 August 2023.
    First targeted critical-mineral export controls; widely interpreted as a response to
    US semiconductor restrictions.
  affected_elements: [Ga, Ge]
  affected_forms: [metal, compound]
  event_type: export_control
  source_country: CN
  source_name: "MOFCOM/GAC Announcement No. 23 of 2023"
  source_url: null
  notes: "商务部 海关总署公告2023年第23号, effective 1 Aug 2023"

- id: pe-2024-05-23
  date: "2024-05-23"
  title: "EU Critical Raw Materials Act enters into force"
  description: >-
    Regulation (EU) 2024/1252 sets benchmarks for domestic extraction (10%), processing (40%),
    and recycling (25%) of critical raw materials including rare earths, gallium, and germanium
    by 2030.
  affected_elements: []
  affected_forms: []
  event_type: regulation
  source_country: EU
  source_name: "Regulation (EU) 2024/1252"
  source_url: null
  notes: "OJ L, 2024/1252, 3 May 2024; entered into force 23 May 2024"

- id: pe-2024-08-15
  date: "2024-08-15"
  title: "China restricts antimony exports"
  description: >-
    Export controls imposed on antimony and related items, effective 15 September 2024.
    Sb price rose from ~$12,000/t to >$38,000/t within six months of announcement.
  affected_elements: [Sb]
  affected_forms: [metal, oxide]
  event_type: export_control
  source_country: CN
  source_name: "MOFCOM/GAC Announcement No. 33 of 2024"
  source_url: null
  notes: "商务部 海关总署公告2024年第33号, effective 15 Sep 2024"

- id: pe-2024-10-01
  date: "2024-10-01"
  title: "Rare Earth Management Regulations enter into force"
  description: >-
    State Council Order No. 785 establishes a comprehensive framework for rare earth mining,
    smelting, separation, and circulation. Codifies production quotas, traceability, and
    strategic reserve management.
  affected_elements: []
  affected_forms: []
  event_type: regulation
  source_country: CN
  source_name: "State Council Order No. 785"
  source_url: null
  notes: "稀土管理条例, promulgated 25 Jun 2024, effective 1 Oct 2024"

- id: pe-2024-12-03
  date: "2024-12-03"
  title: "China bans gallium, germanium, and antimony exports to the United States"
  description: >-
    Article 1 prohibits Ga/Ge/Sb exports to any US military end-user; Article 2 imposes a
    blanket ban on all Ga/Ge/Sb exports to the US. Art. 1 remains active; Art. 2 was
    suspended in Nov 2025 until Nov 2026.
  affected_elements: [Ga, Ge, Sb]
  affected_forms: [metal, compound, oxide]
  event_type: export_ban
  source_country: CN
  source_name: "MOFCOM Announcement No. 46 of 2024"
  source_url: null
  notes: "商务部公告2024年第46号, effective 3 Dec 2024"

- id: pe-2025-02-04
  date: "2025-02-04"
  title: "China extends export controls to tungsten, tellurium, bismuth, molybdenum, and indium"
  description: >-
    All five metals require export licences. Tellurium controls are notable as Te is critical
    for CdTe thin-film solar (~60% of demand) and is a byproduct of copper refining with
    inelastic supply.
  affected_elements: [W, Te, Bi, Mo, In]
  affected_forms: [metal, oxide, powder, carbide]
  event_type: export_control
  source_country: CN
  source_name: "MOFCOM/GAC Announcement No. 10 of 2025"
  source_url: null
  notes: "商务部 海关总署公告2025年第10号, effective 4 Feb 2025"

- id: pe-2025-04-04
  date: "2025-04-04"
  title: "China imposes export controls on seven medium and heavy rare earths"
  description: >-
    Export licences required for samarium, gadolinium, terbium, dysprosium, lutetium,
    scandium, and yttrium — covering metals, alloys, oxides, compounds, and permanent
    magnet materials. Targets the materials most critical for NdFeB magnets and defence.
  affected_elements: [Sm, Gd, Tb, Dy, Lu, Sc, Y]
  affected_forms: [metal, oxide, alloy, compound]
  event_type: export_control
  source_country: CN
  source_name: "MOFCOM/GAC Announcement No. 18 of 2025"
  source_url: null
  notes: "商务部 海关总署公告2025年第18号, effective 4 Apr 2025"

- id: pe-2025-10-09
  date: "2025-10-09"
  title: "China escalates: six announcements tighten controls and ban US exports"
  description: >-
    Six simultaneous announcements (Nos. 55–58, 61, 62) suspend pending licence applications,
    halt new applications for US-destined shipments, add end-user verification, and expand
    controlled item scope. Article 2 of No. 46/2024 (Ga/Ge/Sb US ban) reactivated.
    Subsequently suspended by Nos. 70 and 72 of 2025.
  affected_elements: [Ga, Ge, Sb, W, Te, Bi, Mo, In, Sm, Gd, Tb, Dy, Lu, Sc, Y]
  affected_forms: [metal, oxide, alloy, compound]
  event_type: export_control
  source_country: CN
  source_name: "MOFCOM Announcements Nos. 55–58, 61, 62 of 2025"
  source_url: null
  notes: "商务部公告2025年第55–58号、第61–62号, effective 9 Oct 2025; later suspended"

- id: pe-2025-11-09
  date: "2025-11-09"
  title: "China suspends October 2025 escalation measures until November 2026"
  description: >-
    MOFCOM suspends all six October 2025 announcements plus the Ga/Ge/Sb US-specific ban
    (Art. 2, No. 46/2024). Suspension runs until 28 November 2026. Underlying licence
    requirements remain.
  affected_elements: [Ga, Ge, Sb, W, Te, Bi, Mo, In, Sm, Gd, Tb, Dy, Lu, Sc, Y]
  affected_forms: [metal, oxide, alloy, compound]
  event_type: suspension
  source_country: CN
  source_name: "MOFCOM Announcements No. 70 and No. 72 of 2025"
  source_url: null
  notes: "商务部公告2025年第70号 and 第72号, effective 7–9 Nov 2025"

- id: pe-2026-01-06
  date: "2026-01-06"
  title: "Japan prohibited from receiving Chinese dual-use exports"
  description: >-
    China prohibits dual-use exports to Japan, citing Japan's restrictions on semiconductor
    equipment to China. First country-wide prohibition order since the US ban in Dec 2024.
  affected_elements: [Ga, Ge, Sb, W, Te, Bi, Mo, In, Sm, Gd, Tb, Dy, Lu, Sc, Y]
  affected_forms: [metal, oxide, alloy, compound]
  event_type: export_ban
  source_country: CN
  source_name: "MOFCOM Announcement No. 1 of 2026"
  source_url: null
  notes: "商务部公告2026年第1号, effective 6 Jan 2026"

- id: pe-2026-02-24
  date: "2026-02-24"
  title: "China sanctions 15 Japanese defence entities"
  description: >-
    MOFCOM designates 15 Japanese companies as "unreliable entities," prohibiting export of
    controlled items (including all dual-use minerals). Retaliation for Japan's January 2026
    prohibition order.
  affected_elements: []
  affected_forms: []
  event_type: sanction
  source_country: CN
  source_name: "MOFCOM Announcement No. 17 of 2026"
  source_url: null
  notes: "商务部公告2026年第17号, effective 24 Feb 2026"
