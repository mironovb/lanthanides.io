# Key Developments — structured highlights shown on homepage

- title: "REE export restriction"
  detail: "Licenses required for metals, alloys, oxides, compounds, and permanent magnets"
  elements: [Sm, Gd, Tb, Dy, Lu, Sc, Y]
  severity: high
  ref: "MOFCOM/GAC Ann. No. 18/2025"

- title: "End-user certification"
  detail: "Buyers must certify non-military end-use for scandium and other controlled materials"
  elements: [Sc]
  severity: high
  ref: "PRC Export Control Law Art. 16"

- title: "3–4 month lead time"
  detail: "License review takes up to 45 working days; effective procurement delay significantly longer"
  severity: medium
  ref: "PRC Export Control Law Art. 13"

- title: "Ga & Ge US embargo"
  detail: "Full export ban to the United States since Dec 2024; per-shipment license elsewhere"
  elements: [Ga, Ge]
  severity: high
  ref: "MOFCOM Ann. No. 46/2024"

- title: "W, Te, Bi, Mo, In controls"
  detail: "Added to export control list with immediate effect"
  elements: [W, Te, Bi, Mo, In]
  severity: medium
  ref: "MOFCOM/GAC Ann. No. 10/2025"
