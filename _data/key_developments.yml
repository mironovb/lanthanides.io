# Key Developments — 4 items, all China-related

- title: "China restricts medium & heavy REE exports"
  detail: "Licenses required for Sm, Gd, Tb, Dy, Lu, Sc, Y — metals, alloys, oxides, compounds, and permanent magnets"
  elements: [Sm, Gd, Tb, Dy, Lu, Sc, Y]
  severity: high
  ref: "MOFCOM/GAC Ann. No. 18/2025"

- title: "China requires end-use certification; 3–4 month lead time"
  detail: "Exporters must obtain end-user certificates confirming non-military use. License review takes up to 45 working days"
  severity: high
  ref: "PRC Export Control Law Art. 13, 16"

- title: "China embargoes Ga & Ge exports to the US"
  detail: "Full ban since Dec 2024; all other destinations require per-shipment licenses"
  elements: [Ga, Ge]
  severity: high
  ref: "MOFCOM Ann. No. 46/2024"

- title: "China adds W, Te, Bi, Mo, In to export control list"
  detail: "Controls took immediate effect Feb 2025, citing national security"
  elements: [W, Te, Bi, Mo, In]
  severity: medium
  ref: "MOFCOM/GAC Ann. No. 10/2025"
