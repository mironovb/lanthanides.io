# Key Developments — brief highlights shown on homepage

- summary: "Near-total export restriction on medium and heavy rare earths (Sm, Gd, Tb, Dy, Lu, Sc, Y) — licenses required for metals, alloys, oxides, compounds, and permanent magnets."
  severity: high
  ref: "MOFCOM/GAC Ann. No. 18/2025"

- summary: "End-user certificates now mandatory for scandium exports — buyers must certify material will not be used for military purposes."
  severity: high
  ref: "PRC Export Control Law Art. 16; MOFCOM end-user review procedures"

- summary: "Export license processing may take up to 45 working days (~3–4 months with review queues), creating significant lead-time risk for procurement."
  severity: medium
  ref: "PRC Export Control Law Art. 13"

- summary: "Gallium and germanium exports to the US fully prohibited since December 2024; all other destinations require per-shipment licenses."
  severity: high
  ref: "MOFCOM Ann. No. 46/2024"

- summary: "Tungsten, tellurium, bismuth, molybdenum, and indium added to export control list with immediate effect (Feb 2025)."
  severity: medium
  ref: "MOFCOM/GAC Ann. No. 10/2025"
