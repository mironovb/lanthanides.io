- date: 2026-04-03
  headline: "China's invisible rare earth wall: why suspended controls don't mean available supply"
  body: >-
    Analysis of the six-layer domestic regulatory architecture — production quotas, SOE
    duopoly, mandatory traceability, customs enforcement, VAT structure, and regulatory
    ambiguity — that constrains rare earth trade regardless of whether MOFCOM export controls
    are formally active. Heavy REE mining quotas frozen at 19,150 t for six years; 80.7% of
    historical thulium supply was illegally produced; customs enforcement cases up 248% in 2025.
  status: active
  tag: Analysis
  article: chinas-invisible-rare-earth-wall
  elements: [Sm, Gd, Tb, Dy, Lu, Sc, Y, Ho, Tm, Eu, Er, Yb]
  references:
    - label: "State Council Order No. 785, Rare Earth Management Regulations"
      note: "稀土管理条例, effective 1 Oct 2024 — 32-article framework, never suspended"
    - label: "Zhang et al., Journal of Industrial Ecology, 2024"
      note: "80.7% of China's Tm production 2011–2020 from illegal mining (1,506 t cumulative)"
    - label: "MOFCOM/GAC enforcement data, 2025"
      note: "Administrative cases: 91 (2024) → 317 (2025), +248%; max fine RMB 6.34M"

- date: 2026-03-10
  headline: "Chinese export licence timelines: what February 2026 quotes reveal"
  body: >-
    Direct quotation requests to Chinese manufacturers reveal the real mechanics of
    export licensing: thulium metal in ~3 weeks (during suspension window, 3N purity
    ceiling), scandium oxide in ~4 months (under never-suspended No. 18 controls).
    Purity constraints and certification timelines shape what non-Chinese buyers can
    actually obtain.
  status: active
  tag: Analysis
  article: chinese-export-licence-timelines
  elements: [Tm, Sc, Ho, Er, Eu, Yb, Sm, Gd, Tb, Dy, Lu, Y]
  references:
    - label: "Direct supplier quotation requests, February 2026"
      note: "Timelines: ~3 weeks (Tm, during suspension), ~4 months (Sc, under No. 18 controls)"

- date: 2026-02-24
  headline: "China sanctions 15 Japanese defence entities"
  body: >-
    MOFCOM designates 15 Japanese companies as "unreliable entities," prohibiting
    export of controlled items (including all dual-use minerals). Retaliatory measure
    following Japan's Jan 2026 prohibition order targeting Chinese semiconductor firms.
  status: active
  tag: Sanctions
  elements: []
  references:
    - label: "MOFCOM Announcement No. 17 of 2026"
      note: "商务部公告2026年第17号, effective 24 Feb 2026"
    - label: "Reuters, 'China retaliates with sanctions on Japanese defence firms,' 24 Feb 2026"

- date: 2026-01-06
  headline: "Japan prohibited from receiving Chinese dual-use exports"
  body: >-
    China prohibits export of dual-use items to Japan, citing Japan's restrictions on
    semiconductor equipment to China. Covers gallium, germanium, antimony, rare earths,
    and all items on China's dual-use export control list. First country-wide prohibition
    order since the US ban in Dec 2024.
  status: active
  tag: Export Ban
  elements: [Ga, Ge, Sb, W, Te, Bi, Mo, In, Sm, Gd, Tb, Dy, Lu, Sc, Y]
  references:
    - label: "MOFCOM Announcement No. 1 of 2026"
      note: "商务部公告2026年第1号, effective 6 Jan 2026"
    - label: "Japan METI semiconductor export controls, effective Jul 2023, expanded Dec 2025"

- date: 2025-11-09
  headline: "China suspends Oct 2025 escalation measures until Nov 2026"
  body: >-
    Following diplomatic engagement, MOFCOM suspends all six October 2025 announcements
    (Nos. 55–58, 61, 62) plus the Ga/Ge/Sb US-specific ban (Art. 2, No. 46/2024). Suspension
    runs until 28 November 2026. Underlying licence requirements remain; only the escalation
    measures and the US-specific ban are paused.
  status: active
  tag: Suspension
  elements: [Ga, Ge, Sb, W, Te, Bi, Mo, In, Sm, Gd, Tb, Dy, Lu, Sc, Y]
  references:
    - label: "MOFCOM Announcements No. 70 and No. 72 of 2025"
      note: "商务部公告2025年第70号 and 第72号, effective 7–9 Nov 2025"
    - label: "Suspension expires 28 November 2026 — controls revert to pre-Oct 2025 baseline unless renewed"

- date: 2025-11-20
  headline: "MOFCOM October 2025 suspension: what Nos. 55–62 mean for Ho, Er, Tm"
  body: >-
    Analysis of the six October 2025 announcements that expanded export controls to
    holmium, erbium, thulium, europium, and ytterbium — and their suspension one month
    later until November 28, 2026. The suspension is a diplomatic pause, not a policy
    reversal. Default outcome at expiry: controls reimpose automatically. Procurement
    window analysis for the suspension period.
  status: active
  tag: Analysis
  article: mofcom-october-2025-suspension
  elements: [Ho, Er, Tm, Eu, Yb, Ga, Ge, Sb]
  references:
    - label: "MOFCOM Announcements Nos. 55–58, 61, 62 of 2025"
      note: "Issued 9 Oct 2025, suspended by Nos. 70/72 on 7–9 Nov 2025 until 28 Nov 2026"

- date: 2025-10-09
  headline: "China escalates: six announcements tighten controls and ban US exports"
  body: >-
    Six simultaneous announcements (Nos. 55–58, 61, 62) dramatically tighten enforcement:
    suspend all pending licence applications, halt new applications for US-destined shipments,
    add end-user verification requirements, and expand controlled item scope. Article 2 of
    No. 46/2024 (Ga/Ge/Sb US ban) activated alongside. Triggered by US tariff escalation
    to 145% on Chinese goods.
  status: suspended
  tag: Escalation
  elements: [Ga, Ge, Sb, W, Te, Bi, Mo, In, Sm, Gd, Tb, Dy, Lu, Sc, Y]
  references:
    - label: "MOFCOM Announcements No. 55, 56, 57, 58, 61, and 62 of 2025"
      note: "商务部公告2025年第55–58号、第61–62号, effective 9 Oct 2025"
    - label: "Subsequently suspended by Nos. 70 and 72 of 2025 (Nov 2025)"

- date: 2025-04-04
  headline: "China imposes export controls on seven medium and heavy rare earths"
  body: >-
    Export licences required for samarium, gadolinium, terbium, dysprosium, lutetium,
    scandium, and yttrium — covering metals, alloys, oxides, compounds, and permanent
    magnet materials. Announced in direct retaliation to escalating US tariffs. Targets
    the materials most critical for NdFeB permanent magnets and defence applications.
  status: active
  tag: Export Control
  elements: [Sm, Gd, Tb, Dy, Lu, Sc, Y]
  references:
    - label: "MOFCOM/GAC Announcement No. 18 of 2025"
      note: "商务部 海关总署公告2025年第18号, effective 4 Apr 2025"
    - label: "Covers HS codes 2846.90, 8505.11, 8505.19 and others"

- date: 2025-02-04
  headline: "China extends export controls to tungsten, tellurium, bismuth, molybdenum, and indium"
  body: >-
    All five metals now require export licences. Controls took effect immediately
    upon publication, citing national security and non-proliferation. Tellurium controls
    are notable as Te is critical for CdTe thin-film solar (~60% of demand) and is a
    byproduct of copper refining with inelastic supply.
  status: active
  tag: Export Control
  elements: [W, Te, Bi, Mo, In]
  references:
    - label: "MOFCOM/GAC Announcement No. 10 of 2025"
      note: "商务部 海关总署公告2025年第10号, effective 4 Feb 2025"
    - label: "Te/W/Bi/Mo/In added to Dual-Use Items and Technologies Export Control List"

- date: 2024-12-03
  headline: "China bans gallium, germanium, and antimony exports to the United States"
  body: >-
    Article 1 of Announcement No. 46/2024 prohibits export of Ga, Ge, and Sb (and their
    compounds) to any US military end-user or military end-use. Article 2 imposes a blanket
    ban on all Ga/Ge/Sb exports to the US regardless of end-use. Art. 1 remains permanently
    active; Art. 2 was suspended in Nov 2025.
  status: active
  tag: Export Ban
  elements: [Ga, Ge, Sb]
  references:
    - label: "MOFCOM Announcement No. 46 of 2024"
      note: "商务部公告2024年第46号, effective 3 Dec 2024"
    - label: "Art. 1 (military end-use ban): active. Art. 2 (blanket US ban): suspended Nov 2025 until Nov 2026"

- date: 2024-10-01
  headline: "Rare Earth Management Regulations enter into force"
  body: >-
    State Council Order No. 785 establishes comprehensive regulatory framework for rare earth
    mining, smelting, separation, and circulation. Codifies production quotas, traceability
    requirements, and strategic reserve management. Provides the legal infrastructure
    underpinning subsequent export control announcements.
  status: active
  tag: Regulation
  elements: []
  references:
    - label: "State Council Order No. 785, 'Rare Earth Management Regulations'"
      note: "稀土管理条例, promulgated 25 Jun 2024, effective 1 Oct 2024"
    - label: "First comprehensive national regulation governing rare earth resources"

- date: 2024-08-15
  headline: "China restricts antimony exports"
  body: >-
    Export controls imposed on antimony and related items, effective 15 September 2024.
    Antimony is critical for flame retardants, lead-acid batteries, ammunition, and
    infrared optics. China produces ~48% of global antimony; controls triggered immediate
    price increases of 200%+ through early 2025.
  status: active
  tag: Export Control
  elements: [Sb]
  references:
    - label: "MOFCOM/GAC Announcement No. 33 of 2024"
      note: "商务部 海关总署公告2024年第33号, effective 15 Sep 2024"
    - label: "Sb price rose from ~$12,000/t to >$38,000/t within six months of announcement"

- date: 2024-05-23
  headline: "EU Critical Raw Materials Act enters into force"
  body: >-
    Regulation (EU) 2024/1252 establishes benchmarks for domestic extraction, processing,
    and recycling of critical raw materials including rare earths, gallium, and germanium.
    Sets targets of 10% extraction, 40% processing, and 25% recycling of annual EU
    consumption by 2030.
  status: active
  tag: Regulation
  elements: []
  references:
    - label: "Regulation (EU) 2024/1252"
      note: "OJ L, 2024/1252, 3 May 2024; entered into force 23 May 2024"

- date: 2023-07-03
  headline: "China imposes first export controls on gallium and germanium"
  body: >-
    China announced export licence requirements for gallium and germanium products,
    effective 1 August 2023. These were the first targeted critical mineral export
    controls, widely interpreted as a response to US semiconductor restrictions.
    Marked the beginning of systematic Chinese resource leverage.
  status: active
  tag: Export Control
  elements: [Ga, Ge]
  references:
    - label: "MOFCOM/GAC Announcement No. 23 of 2023"
      note: "商务部 海关总署公告2023年第23号, effective 1 Aug 2023"
    - label: "First use of mineral export controls as trade-policy instrument since WTO rare earth dispute (2014)"
