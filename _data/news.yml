# Regulatory & Trade Developments — China Export Controls Timeline
# status: active | suspended | superseded | historic

- date: 2026-04-05
  headline: "The retail premium puzzle: why collector-grade rare earths cost multiples of wholesale"
  body: >-
    Structural economics behind retail-to-bulk price ratios of 5x to 100x: small lot
    processing, reactive metal handling, argon packaging, niche demand economics,
    and the widening gap driven by Chinese export controls. The retail premium is
    not a market inefficiency — it is the equilibrium price of serving a market at
    1/1,000,000th the scale of industrial consumption.
  status: active
  tag: Analysis
  article: retail-premium-puzzle
  elements: [La, Ce, Nd, Pr, Dy, Tb, Gd, Ho, Er, Tm, Sc, Y, Eu, Sm, Yb]
  references:
    - label: "Multi-platform pricing data from eBay, Alibaba, and Amazon surveys"
      note: "Retail premiums range from 1–2x (gallium) to 100x+ (yttrium) versus bulk benchmarks"

- date: 2026-04-04
  headline: "eBay rare earth market research: who sells what, and at what price"
  body: >-
    Multi-platform survey of retail rare earth and strategic metal pricing across eBay,
    Alibaba, and Amazon — April 2026. Documents every qualifying listing for 25+ elements,
    mapping the seller landscape from European specialists to Chinese industrial wholesalers.
    Retail premiums range from 1–2x (gallium) to over 100x (yttrium) versus bulk benchmarks.
  status: active
  tag: Market Research
