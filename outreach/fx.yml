# outreach/fx.yml — manually maintained FX rate table.
#
# This file is the ONLY source of FX rates for inbound supplier-quote intake.
# It is updated BY HAND. Nothing in this repo calls a live FX API; nothing
# auto-refreshes these numbers. The motivation is the same as for prices:
# inventing a rate is the same kind of error as inventing a price.
#
# How to update:
#   1. Look up the current rate from any reference you trust (mid-market
#      rate from your bank, a published board, a financial data terminal).
#   2. Edit the number below to match.
#   3. Set `updated` to today's date.
#   4. Optionally note where the rate came from in `notes`.
#
# Each entry under `rates` means: 1 unit of <CURRENCY> equals <rate> USD.
# USD itself is included as 1.0 so the file is self-describing.
#
# If a supplier quote arrives in a currency that is NOT listed here,
# outreach/intake.py refuses to write the observation until you add a rate.
# That is intentional — the tool will not guess.

updated: 2026-05-21
notes: "Starter values; verify and refresh against a current reference before relying on them."

rates:
  USD: 1.0
  EUR: 1.08
  GBP: 1.27
  CNY: 0.14
  JPY: 0.0066
  CHF: 1.13
  AUD: 0.66
  CAD: 0.73
  KRW: 0.00072
  INR: 0.012
